<!DOCTYPE html>

<head>

    <script>
        // 配置Tailwind自定义主题
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        telecom: '#0096E6',    // 电信蓝
                        unicom: '#E6007E',     // 联通粉紫
                        mobile: '#E67700',     // 移动橙红
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        darkCard: '#2D2D2D',

    <style type="text/tailwindcss">

        /* 优化复制/隐藏按钮交互 */

    <script>
        // ========== 全局常量和工具函数 ==========
        // API基础配置（根据实际接口调整）
        const API_CONFIG = {
            baseUrl: 'http://mobile.kuyichong.com/client/v3',
            uid: '50' // 固定UID，根据实际情况调整
        };

        // 自动更新定时器存储
        const autoUpdateTimers = {};
        
        // 流量单位转换：M转GB
        function formatFlow(mValue) {
            const gbValue = parseFloat(mValue) / 1024;
            return gbValue.toFixed(2) + ' GB';
        }

        // 流量单位原始值转换（M转数字）
        function parseFlowValue(mValue) {
            if (typeof mValue === 'string') {
                return parseFloat(mValue.replace('M', '')) || 0;
            }
            return parseFloat(mValue) || 0;
        }

        // 根据APN名称获取运营商信息
        function getOperatorByApn(apnName) {
            if (!apnName) return { cls: 'telecom', name: '未知运营商' };
            
            const apn = apnName.toLowerCase();
            if (apn.includes('cm') || apn.includes('miot')) {
                return { cls: 'mobile', name: '中国移动' };
            } else if (apn.includes('cu') || apn.includes('unicom')) {
                return { cls: 'unicom', name: '中国联通' };
            } else if (apn.includes('ct') || apn.includes('telecom')) {
                return { cls: 'telecom', name: '中国电信' };
            } else {
                return { cls: 'telecom', name: '未知运营商' };
            }
        }

        // 格式化卡号显示（隐藏中间部分）
        function formatCardNumber(number) {
            if (!number) return '';
            if (number.length <= 8) return number;
            return number.replace(/(.{4}).+(.{4})/, '$1****$2');
        }

        // ========== 本地存储管理 ==========
        // 存储键名
        const STORAGE_KEYS = {
            cards: 'coolfish_cards',
            darkMode: 'darkMode',
            bgImage: 'bgImage'
        };

        // 获取所有卡片数据
        function getStoredCards() {
            const stored = localStorage.getItem(STORAGE_KEYS.cards);
            return stored ? JSON.parse(stored) : [];
        }

        // 检查卡号是否已存在（通过id/tel/iccid）
        function isCardExists(identifier) {
            if (!identifier) return false;
            
            const cards = getStoredCards();
            const identifierLower = identifier.toLowerCase().trim();
            
            return cards.some(card => {
                // 检查存储的卡片ID
                if (card.id === identifierLower) return true;
                
                // 检查API返回的原始数据
                if (card.loginData) {
                    const data = card.loginData;
                    return (
                        (data.id && data.id.toString() === identifier) ||
                        (data.tel && data.tel.toLowerCase() === identifierLower) ||
                        (data.iccid && data.iccid.toLowerCase() === identifierLower)
                    );
                }
                
                // 检查用户输入的卡号
                return card.number && card.number.toLowerCase() === identifierLower;
            });
        }

        // 保存卡片数据
        function saveCardToStorage(cardData) {
            const cards = getStoredCards();
            // 检查是否已存在相同ID的卡片
            const existsIndex = cards.findIndex(card => 
                card.id === cardData.id || 
                (card.loginData && cardData.loginData && card.loginData.id === cardData.loginData.id)
            );
            
            if (existsIndex !== -1) {
                // 更新现有卡片
                cards[existsIndex] = cardData;
            } else {
                // 添加新卡片
                cards.push(cardData);
            }
            
            localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(cards));
            return cards;
        }

        // 删除卡片数据
        function deleteCardFromStorage(cardId) {
            let cards = getStoredCards();
            cards = cards.filter(card => card.id !== cardId);
            
            // 清除该卡片的自动更新定时器
            if (autoUpdateTimers[cardId]) {
                clearInterval(autoUpdateTimers[cardId]);
                delete autoUpdateTimers[cardId];
            }
            
            localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(cards));
            
            // 如果没有卡片了，显示空状态
            if (cards.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
            }
            
            return cards;
        }

        // ========== API请求函数 ==========
        // 登录获取cardId和卡信息
        async function loginCard(cardNumber) {
            try {
                const formData = new FormData();
                formData.append('card', cardNumber);
                formData.append('uid', API_CONFIG.uid);

                const response = await fetch(`${API_CONFIG.baseUrl}/loginInfo`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`登录失败: ${response.status}`);
                }

                const data = await response.json();
                
                // 统一API返回格式
                if (data.status !== 0) {
                    throw new Error(data.message || '登录失败');
                }

                return data.data; // 返回完整的登录数据
            } catch (error) {
                console.error('登录失败:', error);
                throw error;
            }
        }

        // 查询流量数据
        async function queryFlowData(cardId) {
            try {
                const formData = new FormData();
                formData.append('cardId', cardId);

                const response = await fetch(`${API_CONFIG.baseUrl}/flow`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`查询失败: ${response.status}`);
                }

                const data = await response.json();
                
                // 统一API返回格式
                if (data.status !== 0) {
                    throw new Error(data.message || '查询失败');
                }

                return data.data; // 返回流量数据
            } catch (error) {
                console.error('查询流量失败:', error);
                throw error;
            }
        }

        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            const toastIcon = document.getElementById('toastIcon');
            
            // 清空之前的定时器，避免多个提示叠加
            if (toast.timer) clearTimeout(toast.timer);
            
            toastText.textContent = text;
            toast.classList.remove('hidden', 'translate-y-4', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            if (isError) {
                toastIcon.className = 'fa fa-exclamation-circle text-danger';
                toast.classList.add('bg-danger/95');
                toast.classList.remove('bg-gray-800/95');
            } else {
                toastIcon.className = 'fa fa-check-circle text-green-400';
                toast.classList.remove('bg-danger/95');
                toast.classList.add('bg-gray-800/95');
            }
            
            toast.timer = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 300);
            }, 2500);
        }

        function startAutoUpdate(cardId) {
            // 清除已有定时器，防止重复创建
            if (autoUpdateTimers[cardId]) {
                clearInterval(autoUpdateTimers[cardId]);
            }
            
            // 设置新定时器（10分钟 = 600000毫秒）
            autoUpdateTimers[cardId] = setInterval(() => {
                updateCardData(cardId, true); // true表示自动更新，不显示加载提示
            }, 600000);

        // 更新卡片数据
        async function updateCardData(cardId, isAutoUpdate = false) {
            const cards = getStoredCards();
            const card = cards.find(c => c.id === cardId);
            
            if (!card) {
                !isAutoUpdate && showToast('卡片不存在', true);
                return;
            }
            
            try {
                // 非自动更新时显示加载状态
                !isAutoUpdate && showToast('正在查询流量数据...');
                
                // 1. 登录获取cardId和卡信息
                const loginData = await loginCard(card.number);
                
                // 2. 查询流量数据
                const flowData = await queryFlowData(loginData.id);
                
                // 3. 处理数据
                const now = new Date();
                const timeStr = now.toLocaleString();
                
                // 计算使用率
                const usedFlow = parseFlowValue(flowData.useFlow || flowData.monthUseFlow || 0);
                const totalFlow = parseFlowValue(flowData.monthSumFlow || (loginData.sumflow ? loginData.sumflow / 1024 : 0));
                const restFlow = totalFlow - usedFlow;
                const usageRate = totalFlow > 0 ? ((usedFlow / totalFlow) * 100).toFixed(1) : 0;
                
                // 4. 更新卡片数据
                const updatedCard = {
                    ...card,
                    loginData: loginData,       // 保存登录接口返回的完整数据
                    flowData: flowData,         // 保存流量接口返回的完整数据
                    totalFlow: formatFlow(totalFlow),
                    usedFlow: formatFlow(usedFlow),
                    restFlow: formatFlow(restFlow),
                    usageRate: usageRate,
                    lastQuery: timeStr,
                    endTime: flowData.endtime ? flowData.endtime.split(' ')[0] : '',
                    startTime: flowData.starttime ? flowData.starttime.split(' ')[0] : '',
                    cardStatusDesc: flowData.cardStatusDesc || '正常',
                    useDay: flowData.useDay || 0,
                    sumDay: flowData.sumDay || 30,
                    isActive: true
                };
                
                // 5. 保存到本地存储
                saveCardToStorage(updatedCard);
                
                // 6. 重新渲染卡片
                renderCardContent(updatedCard);
                
                // 7. 确保卡片处于显示状态
                showCardById(cardId);
                
                // 8. 显示提示（非自动更新时）
                !isAutoUpdate && showToast('流量数据更新成功');
                
            } catch (error) {
                // 自动更新时只打印错误，不弹窗
                if (!isAutoUpdate) {
                    showToast(`查询失败: ${error.message}`, true);
                } else {
                    console.error(`卡片${cardId}自动更新失败:`, error);
                }
            }
        }

        // 根据ID显示指定卡片
        function showCardById(cardId) {
            // 隐藏所有卡片
            document.querySelectorAll('.card-content').forEach(card => {
                card.style.display = 'none';
            });
            // 移除所有标签激活状态
            document.querySelectorAll('.tab-btn').forEach(tab => {
                tab.classList.remove('tab-active');
            });
            // 显示目标卡片
            const targetCard = document.querySelector(`.card-content[data-card-id="${cardId}"]`);
            if (targetCard) {
                targetCard.style.display = 'block';
            }
            // 激活目标标签
            const targetTab = document.querySelector(`.tab-btn[data-card-id="${cardId}"]`);
            if (targetTab) {
                targetTab.classList.add('tab-active');
            }
            
            // 更新本地存储中的激活状态
            let cards = getStoredCards();
            cards = cards.map(card => ({
                ...card,
                isActive: card.id === cardId
            }));
            localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(cards));
        }

        // ========== 事件绑定（优化版） ==========
        function bindEventsDelegate() {
            // 标签切换事件委托
            document.getElementById('tabList').addEventListener('click', function(e) {
                const tabBtn = e.target.closest('.tab-btn');
                if (tabBtn) {
                    const cardId = tabBtn.getAttribute('data-card-id');
                    showCardById(cardId);
                }
            });

            // 标签删除按钮事件
            document.getElementById('tabList').addEventListener('click', function(e) {
                const deleteBtn = e.target.closest('.tab-delete-btn');
                if (deleteBtn) {
                    e.stopPropagation(); // 阻止触发标签切换
                    const cardId = deleteBtn.getAttribute('data-card-id');
                    showDeleteConfirmModal(cardId);
                }
            });

            // 刷新按钮事件委托
            document.getElementById('cardContainer').addEventListener('click', function(e) {
                const refreshBtn = e.target.closest('.refreshBtn');
                if (refreshBtn) {
                    const cardId = refreshBtn.getAttribute('data-card');
                    updateCardData(cardId);
                }
            });

            // 卡号显示/隐藏切换事件委托 - 优化交互
            document.getElementById('cardContainer').addEventListener('click', function(e) {
                const toggleBtn = e.target.closest('.toggle-number');
                if (toggleBtn) {
                    e.stopPropagation();
                    const icon = toggleBtn.querySelector('i');
                    const cardNumber = toggleBtn.parentElement.querySelector('.card-number');
                    const originalNumber = cardNumber.getAttribute('data-original');
                    
                    if (!originalNumber) {
                        showToast('暂无号码可显示', true);
                        return;
                    }
                    
                    if (icon.classList.contains('fa-eye-slash')) {
                        // 隐藏卡号
                        cardNumber.textContent = formatCardNumber(originalNumber);
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                        toggleBtn.setAttribute('title', '显示完整号码');
                    } else {
                        // 显示卡号
                        cardNumber.textContent = originalNumber;
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                        toggleBtn.setAttribute('title', '隐藏号码');
                    }
                }
            });

            // 复制卡号事件委托 - 优化交互和容错
            document.getElementById('cardContainer').addEventListener('click', function(e) {
                const copyBtn = e.target.closest('.copy-number');
                if (copyBtn) {
                    e.stopPropagation();
                    const cardNumber = copyBtn.parentElement.querySelector('.card-number');
                    const originalNumber = cardNumber.getAttribute('data-original');
                    
                    if (!originalNumber) {
                        showToast('暂无号码可复制', true);
                        return;
                    }
                    
                    try {
                        // 现代浏览器剪贴板API
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(originalNumber).then(() => {
                                showToast('号码已复制到剪贴板');
                            }).catch(err => {
                                throw err;
                            });
                        } else {
                            // 降级方案
                            const textArea = document.createElement('textarea');
                            textArea.value = originalNumber;
                            textArea.style.position = 'fixed';
                            textArea.style.left = '-9999px';
                            textArea.style.top = '0';
                            document.body.appendChild(textArea);
                            textArea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textArea);
                            showToast('号码已复制到剪贴板');
                        }
                    } catch (err) {
                        showToast('复制失败，请手动复制', true);
                        console.error('复制失败:', err);
                    }
                }
            });
        }

        // 显示删除确认弹窗
        let currentDeleteCardId = null;
        function showDeleteConfirmModal(cardId) {
            currentDeleteCardId = cardId;
            const deleteModal = document.getElementById('deleteConfirmModal');
            const deleteModalContent = document.getElementById('deleteModalContent');
            showModal(deleteModal, deleteModalContent);
        }

        // 绑定删除确认事件
        function bindDeleteEvents() {
            const deleteModal = document.getElementById('deleteConfirmModal');
            const deleteModalContent = document.getElementById('deleteModalContent');
            const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
            const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
            
            // 取消删除
            cancelDeleteBtn.addEventListener('click', () => {
                hideModal(deleteModal, deleteModalContent);
                currentDeleteCardId = null;
            });
            
            // 点击弹窗外层关闭
            deleteModal.addEventListener('click', (e) => {
                if (e.target === deleteModal) {
                    hideModal(deleteModal, deleteModalContent);
                    currentDeleteCardId = null;
                }
            });
            
            // 确认删除
            confirmDeleteBtn.addEventListener('click', () => {
                if (!currentDeleteCardId) return;
                
                // 删除标签
                const tab = document.querySelector(`.tab-btn[data-card-id="${currentDeleteCardId}"]`);
                if (tab) tab.remove();
                
                // 删除卡片内容
                const card = document.querySelector(`.card-content[data-card-id="${currentDeleteCardId}"]`);
                if (card) card.remove();
                
                // 从本地存储删除
                deleteCardFromStorage(currentDeleteCardId);
                
                // 关闭弹窗
                hideModal(deleteModal, deleteModalContent);
                
                // 显示提示
                showToast('卡片已成功删除');
                
                // 重置当前删除ID
                currentDeleteCardId = null;
                
                // 如果没有卡片了，激活空状态
                if (document.querySelectorAll('.tab-btn').length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    // 激活第一个标签
                    const firstTab = document.querySelector('.tab-btn');
                    if (firstTab) firstTab.click();
                }
            });
        }

        // 绑定添加卡号事件
        function bindAddCardEvents() {
            const addCardBtn = document.getElementById('addCardBtn');
            const addCardModal = document.getElementById('addCardModal');
            const addModalContent = document.getElementById('addModalContent');
            const cancelAddBtn = document.getElementById('cancelAddBtn');
            const confirmAddBtn = document.getElementById('confirmAddBtn');
            
            // 打开添加弹窗
            addCardBtn.addEventListener('click', () => {
                document.getElementById('remarkInput').value = '';
                document.getElementById('cardNumberInput').value = '';
                showModal(addCardModal, addModalContent);
            });
            
            // 取消添加
            cancelAddBtn.addEventListener('click', () => {
                hideModal(addCardModal, addModalContent);
            });
            
            // 点击弹窗外层关闭
            addCardModal.addEventListener('click', (e) => {
                if (e.target === addCardModal) {
                    hideModal(addCardModal, addModalContent);
                }
            });
            
            // 确认添加（自动查询数据）
            confirmAddBtn.addEventListener('click', async () => {
                const remark = document.getElementById('remarkInput').value.trim();
                const cardNumber = document.getElementById('cardNumberInput').value.trim();
                
                // 验证
                if (!cardNumber) {
                    showToast('请输入卡号', true);
                    return;
                }
                
                // 检查是否重复添加（通过id/tel/iccid）
                if (isCardExists(cardNumber)) {
                    showToast('该卡号已添加，请勿重复添加', true);
                    return;
                }
                
                // 限制最多添加4个卡号
                const tabCount = document.querySelectorAll('.tab-btn').length;
                if (tabCount >= 4) {
                    showToast('最多只能添加4个卡号', true);
                    return;
                }
                
                try {
                    // 先调用API验证卡号并获取完整信息
                    const loginData = await loginCard(cardNumber);
                    
                    // 创建新卡片数据（使用API返回的ID作为唯一标识）
                    const newCard = {
                        id: loginData.id.toString(), // 使用API返回的ID作为唯一标识
                        number: cardNumber,
                        remark: remark,
                        loginData: loginData, // 保存完整的登录数据
                        lastQuery: '查询中...',
                        totalFlow: '0.00 GB',
                        usedFlow: '0.00 GB',
                        restFlow: '0.00 GB',
                        usageRate: 0,
                        isActive: true
                    };
                    
                    // 保存到本地存储
                    saveCardToStorage(newCard);
                    
                    // 隐藏空状态
                    document.getElementById('emptyState').classList.add('hidden');
                    
                    // 渲染新卡片
                    renderCard(newCard);
                    
                    // 激活并显示新卡片
                    showCardById(newCard.id);
                    
                    // 关闭弹窗
                    hideModal(addCardModal, addModalContent);
                    
                    // 查询流量数据
                    const flowData = await queryFlowData(loginData.id);
                    newCard.flowData = flowData;
                    
                    // 更新卡片显示
                    renderCardContent(newCard);
                    
                    // 启动自动更新（10分钟一次）
                    startAutoUpdate(newCard.id);
                    
                    // 显示提示
                    showToast('卡号添加成功，已自动查询流量数据');
                    
                } catch (error) {
                    showToast(`添加失败: ${error.message}`, true);
                    console.error('添加卡号失败:', error);
                }
            });
        }

        // 绑定背景设置事件
        function bindBackgroundEvents() {
            const bgSettingBtn = document.getElementById('bgSettingBtn');
            const bgModal = document.getElementById('bgModal');
            const bgModalContent = document.getElementById('bgModalContent');
            const bgUrlInput = document.getElementById('bgUrlInput');
            const bgFileInput = document.getElementById('bgFileInput');
            const fileName = document.getElementById('fileName');
            const confirmBgBtn = document.getElementById('confirmBgBtn');
            const resetBgBtn = document.getElementById('resetBgBtn');
            
            // 本地图片上传处理
            bgFileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    fileName.textContent = file.name;
                    
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        bgUrlInput.value = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    fileName.textContent = '未选择文件';
                }
            });
            
            // 打开背景设置弹窗
            bgSettingBtn.addEventListener('click', () => {
                bgUrlInput.value = localStorage.getItem(STORAGE_KEYS.bgImage) || '';
                fileName.textContent = '未选择文件';
                showModal(bgModal, bgModalContent);
            });
            
            // 关闭背景设置弹窗
            bgModal.addEventListener('click', (e) => {
                if (e.target === bgModal) {
                    hideModal(bgModal, bgModalContent);
                }
            });
            
            // 预设背景点击
            document.querySelectorAll('[data-bg]').forEach(item => {
                item.addEventListener('click', () => {
                    bgUrlInput.value = item.getAttribute('data-bg');
                    fileName.textContent = '未选择文件';
                    document.querySelectorAll('[data-bg]').forEach(i => i.classList.remove('border-primary'));
                    item.classList.add('border-primary');
                });
            });
            
            // 确认设置背景
            confirmBgBtn.addEventListener('click', () => {
                const bgUrl = bgUrlInput.value.trim();
                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    localStorage.setItem(STORAGE_KEYS.bgImage, bgUrl);
                    showToast('背景设置成功');
                } else {
                    showToast('请输入有效的图片链接或选择本地图片', true);
                    return;
                }
                hideModal(bgModal, bgModalContent);
            });
            
            // 重置背景
            resetBgBtn.addEventListener('click', () => {
                document.body.style.backgroundImage = '';
                localStorage.removeItem(STORAGE_KEYS.bgImage);
                bgUrlInput.value = '';
                fileName.textContent = '未选择文件';
                showToast('背景已重置');
                hideModal(bgModal, bgModalContent);
            });
        }

        // ========== 主初始化函数 ==========
        function initApp() {
            // 初始化主题
            initTheme();
            
            // 初始化背景
            initBackground();
            
            // 初始化存储的卡片
            initStoredCards();
            
            // 绑定所有事件
            bindAddCardEvents();
            bindBackgroundEvents();
            bindDeleteEvents();
            bindEventsDelegate();
            
            console.log('酷鱼流量查询应用初始化完成');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
        
        // 全局错误捕获，避免页面崩溃
        window.addEventListener('error', (e) => {
            console.error('全局错误:', e.error);
            showToast('操作出错，请刷新页面重试', true);
        });
        
        // 防止Promise错误未捕获
        window.addEventListener('unhandledrejection', (e) => {
            console.error('未处理的Promise错误:', e.reason);
            showToast('操作出错，请稍后重试', true);
        });
    </script>
</body>
</html>
